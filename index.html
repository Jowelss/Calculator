<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./css/output.css" />
  </head>
  <body>
    <main id="main">
      <div class="show-container">
        <span id="show" class="">0</span>
      </div>
      <div class="button-num__container">
        <span class="button-num">1</span>
        <span class="button-num">2</span>
        <span class="button-num">3</span>
        <span class="button-num">4</span>
        <span class="button-num">5</span>
        <span class="button-num">6</span>
        <span class="button-num">7</span>
        <span class="button-num">8</span>
        <span class="button-num">9</span>
        <span class="button-num">0</span>
      </div>
      <div class="button-operator__container">
        <span class="button-operator" id="sumar">+</span>
        <span class="button-operator" id="restar">-</span>
        <span class="button-operator" id="dividir">/</span>
        <span class="button-operator" id="multiplicar">*</span>
        <span class="button-operator" id="igual">=</span>
      </div>
    </main>
    <script src="./js/app.js"></script>
  </body>
</html>
