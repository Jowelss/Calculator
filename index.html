<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./css/output.css" />
  </head>
  <body>
    <main id="main" class="select-none">
      <div class="historial-container">
        <ul class="historial-list"></ul>
      </div>
      <div class="show-container">
        <span id="show" class="block"></span>
        <span id="show-result" class="block"></span>
        <span class="hidden" id="error"
          >Te falta agregar un valor númerico</span
        >
      </div>

      <div class="number-container">
        <span class="number">1</span>
        <span class="number">2</span>
        <span class="number">3</span>
        <span class="number">4</span>
        <span class="number">5</span>
        <span class="number">6</span>
        <span class="number">7</span>
        <span class="number">8</span>
        <span class="number">9</span>
        <span class="number">0</span>
      </div>

      <div class="operator-container">
        <span class="operator" id="sumar">mas</span>
        <span class="operator" id="restar">menos</span>
        <span class="operator" id="multiplicar">multiplicar</span>
        <span class="operator" id="dividir">dividir</span>
        <span id="result">igual</span>
        <span id="delete">borrar</span>
      </div>
    </main>
    <script src="./js/app.js"></script>
  </body>
</html>
