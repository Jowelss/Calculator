<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      #show {
        height: 20px;
        width: 160px;
        border: 1px solid black;
      }

      main {
        user-select: none;
      }

      .num,
      .signs {
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main id="main">
      <section class="show-container">
        <div id="show"></div>
      </section>
      <section id="nums-container">
        <span class="num">1</span>
        <span class="num">2</span>
        <span class="num">3</span>
        <span class="num">4</span>
        <span class="num">5</span>
        <span class="num">6</span>
        <span class="num">7</span>
        <span class="num">8</span>
        <span class="num">9</span>
        <span class="num">0</span>
      </section>
      <section id="signs-container">
        <span class="sign" id="addition">sumar</span>
        <span class="sign" id="subtract">restar</span>
        <span class="sign" id="equal">igual</span>
        <span class="sign" id="multi">multiplicar</span>
        <span class="sign" id="division">dividir</span>
        <span class="sign" id="eliminate">borrar</span>
      </section>
    </main>
    <script src="./js/app.js"></script>
  </body>
</html>
